<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>资质证书与车险到期提醒小工具 - 分类筛选版</title>
  <style>
    :root {
      --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280;
      --primary:#2563eb; --danger:#dc2626; --warning:#f59e0b; --success:#16a34a;
      --border:#e5e7eb; --soft:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
    header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;padding:28px 24px}
    header h1{margin:0 0 8px;font-size:26px}
    header p{margin:0;opacity:.92}
    main{max-width:1460px;margin:0 auto;padding:20px}
    .notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px;margin-bottom:14px;font-size:13px;color:#7c2d12}
    .grid{display:grid;grid-template-columns:390px 1fr;gap:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 6px 20px rgba(15,23,42,.06);padding:18px}
    h2{font-size:18px;margin:0 0 14px}
    label{font-size:13px;color:var(--muted);display:block;margin:12px 0 6px}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:white}
    textarea{min-height:78px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{border:0;border-radius:10px;padding:10px 13px;background:var(--primary);color:white;cursor:pointer;font-weight:600}
    button.secondary{background:#4b5563}
    button.ghost{background:var(--soft);color:var(--text)}
    button.danger{background:var(--danger)}
    button.success{background:var(--success)}
    button.warning{background:var(--warning);color:#111827}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .tab{background:#eef2ff;color:#1e3a8a}
    .tab.active{background:var(--primary);color:white}
    .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
    .summary div{background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:12px}
    .summary strong{font-size:22px;display:block}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .toolbar input,.toolbar select{width:auto;min-width:150px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid var(--border);padding:10px 8px;text-align:left;vertical-align:top}
    th{background:#f9fafb;color:#374151;position:sticky;top:0;z-index:1}
    .table-wrap{max-height:690px;overflow:auto;border:1px solid var(--border);border-radius:12px}
    .badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;white-space:nowrap}
    .cat{background:#ede9fe;color:#5b21b6}
    .normal{background:#dcfce7;color:#166534}
    .soon{background:#fef3c7;color:#92400e}
    .done{background:#e0e7ff;color:#3730a3}
    .expired{background:#fecaca;color:#7f1d1d}
    .none{background:#f3f4f6;color:#374151}
    .muted{color:var(--muted);font-size:12px;line-height:1.45}
    .mini{font-size:12px;color:var(--muted)}
    .hidden{display:none}
    @media (max-width: 1000px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header>
  <h1>资质证书 / 车险到期提醒小工具</h1>
  <p>已导入：资质证书 148 条，车辆保险 11 条；本版已新增“资质类别”独立列与筛选。</p>
</header>

<main>
  <div class="notice">
    说明：资质类别来自资质 Excel 表第一列，例如软著、商标、专利、许可证等。车辆保险统一归入“车辆保险”类别。
  </div>

  <div class="grid">
    <section class="card">
      <h2>新增 / 编辑事项</h2>
      <input type="hidden" id="editId">

      <label>分类板块</label>
      <select id="section">
        <option>资质证书</option>
        <option>车辆保险</option>
      </select>

      <label>资质类别 / 保险类别</label>
      <input id="certCategory" list="categoryList" placeholder="例如：软著 / 商标 / 许可证 / 车辆保险">
      <datalist id="categoryList"></datalist>

      <label>事项类型</label>
      <select id="type">
        <option>资质证书</option>
        <option>车辆保险</option>
        <option>合同</option>
        <option>其他</option>
      </select>

      <label>主体公司</label>
      <input id="company" placeholder="例如：聚客 / 云算力">

      <label>事项名称</label>
      <input id="name" placeholder="例如：营业执照 / 粤A12345商业险">

      <div class="row">
        <div>
          <label>证书/保单/编号</label>
          <input id="code" placeholder="可不填">
        </div>
        <div>
          <label>负责人</label>
          <input id="owner" placeholder="例如：行政主管">
        </div>
      </div>

      <div class="row">
        <div>
          <label>到期日</label>
          <input id="expireDate" type="date">
        </div>
        <div>
          <label>提前提醒天数</label>
          <input id="remindDays" type="number" min="0" value="90">
        </div>
      </div>

      <label>状态</label>
      <select id="status">
        <option>正常</option>
        <option>续期中</option>
        <option>已续期</option>
        <option>已失效</option>
        <option>已归档</option>
        <option>长期/无到期</option>
      </select>

      <label>备注 / 续期材料 / 联系方式</label>
      <textarea id="remark" placeholder="例如：续期要求、年审月份、保险公司、保单号等"></textarea>

      <div class="actions">
        <button onclick="saveItem()">保存事项</button>
        <button class="ghost" onclick="resetForm()">清空</button>
        <button class="warning" onclick="requestNotify()">开启浏览器提醒</button>
      </div>

      <hr style="border:0;border-top:1px solid var(--border);margin:18px 0">

      <h2>数据备份</h2>
      <div class="actions">
        <button class="secondary" onclick="exportJSON()">导出JSON备份</button>
        <button class="secondary" onclick="exportCSV()">导出CSV表格</button>
        <button class="ghost" onclick="document.getElementById('importFile').click()">导入JSON</button>
        <input id="importFile" class="hidden" type="file" accept=".json" onchange="importJSON(event)">
        <button class="secondary" onclick="reloadInitialData()">恢复本次导入数据</button>
        <button class="danger" onclick="clearAll()">清空全部数据</button>
      </div>
    </section>

    <section class="card">
      <div class="tabs">
        <button id="tabAll" class="tab active" onclick="setSection('全部')">全部</button>
        <button id="tabCert" class="tab" onclick="setSection('资质证书')">资质证书</button>
        <button id="tabCar" class="tab" onclick="setSection('车辆保险')">车辆保险</button>
      </div>

      <div class="summary">
        <div><strong id="countTotal">0</strong><span>当前筛选</span></div>
        <div><strong id="countSoon">0</strong><span>临近提醒</span></div>
        <div><strong id="countExpired">0</strong><span>已过期未处理</span></div>
        <div><strong id="countNone">0</strong><span>长期/无到期</span></div>
        <div><strong id="countDone">0</strong><span>已续期/归档</span></div>
      </div>

      <div class="toolbar">
        <input id="keyword" placeholder="搜索主体/名称/编号/备注" oninput="render()">
        <select id="filterCompany" onchange="render()"><option value="">全部主体</option></select>
        <select id="filterCategory" onchange="render()"><option value="">全部资质类别</option></select>
        <select id="filterStatus" onchange="render()">
          <option value="">全部状态</option>
          <option>正常</option>
          <option>续期中</option>
          <option>已续期</option>
          <option>已失效</option>
          <option>已归档</option>
          <option>长期/无到期</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>状态</th>
              <th>板块</th>
              <th>资质类别</th>
              <th>主体公司</th>
              <th>事项名称</th>
              <th>编号</th>
              <th>到期日</th>
              <th>提醒日</th>
              <th>剩余</th>
              <th>负责人</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p class="mini">黄色=已到提醒期；红色=已到期未处理；灰色=长期/无到期；蓝色=已续期/归档。</p>
    </section>
  </div>
</main>

const INITIAL_CATEGORIES = ["企业证书共12个", "企业证书共4个", "体系标准", "体系标准共3个", "体系标准共3件", "其他证书共1个", "其他证书共3个", "协会会员共2个", "发明专利", "商标共2个", "商标共9个", "软件著作", "软件著作共2件", "软件著作共52件"];
let currentSection = "全部";

function loadItems(){ return JSON.parse(localStorage.getItem(KEY) || "[]"); }
function saveItems(items){ localStorage.setItem(KEY, JSON.stringify(items)); }
function initializeData(){
  if(loadItems().length === 0) saveItems(INITIAL_ITEMS);
  refreshOptions();
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, days){
  if(!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if(isNaN(d.getTime())) return "";
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function daysBetween(a,b){
  if(!a) return null;
  const d1 = new Date(a + "T00:00:00");
  const d2 = new Date(b + "T00:00:00");
  if(isNaN(d1.getTime())) return null;
  return Math.ceil((d1 - d2) / (1000*60*60*24));
}
function remindDate(item){ return item.expireDate ? addDays(item.expireDate, -Number(item.remindDays || 0)) : ""; }
function isClosed(item){ return ["已续期","已归档"].includes(item.status); }
function isNoExpire(item){ return !item.expireDate || item.status === "长期/无到期"; }

function level(item){
  if(isClosed(item)) return "done";
  if(isNoExpire(item)) return "none";
  const left = daysBetween(item.expireDate, todayStr());
  if(left !== null && left < 0) return "expired";
  if(todayStr() >= remindDate(item)) return "soon";
  return "normal";
}
function levelText(item){
  const lv = level(item);
  if(lv === "done") return item.status;
  if(lv === "none") return "无到期";
  if(lv === "expired") return "已过期";
  if(lv === "soon") return "需关注";
  return "正常";
}

function setSection(sec){
  currentSection = sec;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  if(sec === "全部") document.getElementById("tabAll").classList.add("active");
  if(sec === "资质证书") document.getElementById("tabCert").classList.add("active");
  if(sec === "车辆保险") document.getElementById("tabCar").classList.add("active");
  render();
}

function refreshOptions(){
  const items = loadItems();
  const companies = [...new Set(items.map(x => x.company).filter(Boolean))].sort();
  const categories = [...new Set(items.map(x => x.certCategory || "未分类").filter(Boolean))].sort();

  const companySelect = document.getElementById("filterCompany");
  const oldCompany = companySelect.value;
  companySelect.innerHTML = '<option value="">全部主体</option>' + companies.map(c => `<option>${c}</option>`).join("");
  companySelect.value = companies.includes(oldCompany) ? oldCompany : "";

  const catSelect = document.getElementById("filterCategory");
  const oldCat = catSelect.value;
  catSelect.innerHTML = '<option value="">全部资质类别</option>' + categories.map(c => `<option>${c}</option>`).join("");
  catSelect.value = categories.includes(oldCat) ? oldCat : "";

  const list = document.getElementById("categoryList");
  list.innerHTML = categories.map(c => `<option value="${c}"></option>`).join("");
}

function saveItem(){
  const item = {
    id: document.getElementById("editId").value || Date.now().toString(),
    section: document.getElementById("section").value,
    type: document.getElementById("type").value,
    certCategory: document.getElementById("certCategory").value.trim() || "未分类",
    company: document.getElementById("company").value.trim(),
    name: document.getElementById("name").value.trim(),
    code: document.getElementById("code").value.trim(),
    owner: document.getElementById("owner").value.trim(),
    expireDate: document.getElementById("expireDate").value,
    remindDays: Number(document.getElementById("remindDays").value || 0),
    status: document.getElementById("status").value,
    remark: document.getElementById("remark").value.trim(),
    sourceSheet: "手动新增",
    updatedAt: new Date().toISOString()
  };
  if(!item.company || !item.name){
    alert("请至少填写：主体公司、事项名称。");
    return;
  }
  if(!item.expireDate && item.status !== "长期/无到期") item.status = "长期/无到期";
  const items = loadItems();
  const idx = items.findIndex(x => x.id === item.id);
  if(idx >= 0) items[idx] = item; else items.push(item);
  saveItems(items);
  resetForm();
  refreshOptions();
  render();
}

function resetForm(){
  ["editId","company","name","code","owner","expireDate","remark","certCategory"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("section").value = "资质证书";
  document.getElementById("type").value = "资质证书";
  document.getElementById("remindDays").value = 90;
  document.getElementById("status").value = "正常";
}

function editItem(id){
  const item = loadItems().find(x => x.id === id);
  if(!item) return;
  document.getElementById("editId").value = item.id;
  document.getElementById("section").value = item.section || "资质证书";
  document.getElementById("type").value = item.type || "资质证书";
  document.getElementById("certCategory").value = item.certCategory || "";
  document.getElementById("company").value = item.company || "";
  document.getElementById("name").value = item.name || "";
  document.getElementById("code").value = item.code || "";
  document.getElementById("owner").value = item.owner || "";
  document.getElementById("expireDate").value = item.expireDate || "";
  document.getElementById("remindDays").value = item.remindDays ?? 90;
  document.getElementById("status").value = item.status || "正常";
  document.getElementById("remark").value = item.remark || "";
  window.scrollTo({top:0, behavior:"smooth"});
}

function deleteItem(id){
  if(!confirm("确认删除该事项吗？")) return;
  saveItems(loadItems().filter(x => x.id !== id));
  refreshOptions();
  render();
}

function markDone(id){
  const items = loadItems();
  const item = items.find(x => x.id === id);
  if(item){
    item.status = "已续期";
    item.updatedAt = new Date().toISOString();
    saveItems(items);
    render();
  }
}

function filteredItems(){
  const kw = document.getElementById("keyword").value.trim().toLowerCase();
  const fc = document.getElementById("filterCompany").value;
  const fcat = document.getElementById("filterCategory").value;
  const fs = document.getElementById("filterStatus").value;
  return loadItems().filter(x => {
    const secOk = currentSection === "全部" || x.section === currentSection;
    const kwOk = !kw || [x.company,x.name,x.code,x.owner,x.remark,x.sourceSheet,x.certCategory].join(" ").toLowerCase().includes(kw);
    const cOk = !fc || x.company === fc;
    const catOk = !fcat || (x.certCategory || "未分类") === fcat;
    const sOk = !fs || x.status === fs;
    return secOk && kwOk && cOk && catOk && sOk;
  }).sort((a,b) => {
    if(!a.expireDate && b.expireDate) return 1;
    if(a.expireDate && !b.expireDate) return -1;
    return new Date(a.expireDate || "2999-12-31") - new Date(b.expireDate || "2999-12-31");
  });
}

function render(){
  const items = filteredItems();
  document.getElementById("countTotal").textContent = items.length;
  document.getElementById("countSoon").textContent = items.filter(x => level(x)==="soon").length;
  document.getElementById("countExpired").textContent = items.filter(x => level(x)==="expired").length;
  document.getElementById("countNone").textContent = items.filter(x => level(x)==="none").length;
  document.getElementById("countDone").textContent = items.filter(x => level(x)==="done").length;

  document.getElementById("tbody").innerHTML = items.map(x => {
    const lv = level(x);
    const left = daysBetween(x.expireDate, todayStr());
    const leftText = isClosed(x) || isNoExpire(x) ? "-" : (left < 0 ? `超期 ${Math.abs(left)} 天` : `${left} 天`);
    return `<tr>
      <td><span class="badge ${lv}">${levelText(x)}</span></td>
      <td>${x.section || ""}</td>
      <td><span class="badge cat">${x.certCategory || "未分类"}</span></td>
      <td>${x.company || ""}</td>
      <td><strong>${x.name || ""}</strong><br><span class="muted">${x.remark || ""}</span></td>
      <td>${x.code || ""}</td>
      <td>${x.expireDate || "长期/无到期"}</td>
      <td>${remindDate(x) || "-"}</td>
      <td>${leftText}</td>
      <td>${x.owner || ""}</td>
      <td>
        <button class="ghost" onclick="editItem('${x.id}')">编辑</button>
        <button class="success" onclick="markDone('${x.id}')">已续期</button>
        <button class="danger" onclick="deleteItem('${x.id}')">删除</button>
      </td>
    </tr>`;
  }).join("");

  checkNotifications();
}

function requestNotify(){
  if(!("Notification" in window)){
    alert("当前浏览器不支持通知。");
    return;
  }
  Notification.requestPermission().then(p => {
    alert(p === "granted" ? "已开启浏览器通知。页面打开时，如有到期事项会提醒。" : "未开启通知权限。");
  });
}

function checkNotifications(){
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  const today = todayStr();
  const notifiedKey = "cert_car_category_reminder_notified_" + today;
  const notified = JSON.parse(localStorage.getItem(notifiedKey) || "[]");
  const dueItems = loadItems().filter(x => !isClosed(x) && !isNoExpire(x) && ["soon","expired"].includes(level(x)) && !notified.includes(x.id));
  dueItems.slice(0,8).forEach(x => {
    new Notification("到期提醒", {
      body: `${x.section}｜${x.certCategory || ""}｜${x.company}｜${x.name}｜到期日：${x.expireDate}`
    });
    notified.push(x.id);
  });
  localStorage.setItem(notifiedKey, JSON.stringify(notified));
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(loadItems(), null, 2)], {type:"application/json;charset=utf-8"});
  downloadBlob(blob, "资质证书车险提醒备份_含资质类别.json");
}
function exportCSV(){
  const headers = ["板块","事项类型","资质类别","主体公司","事项名称","编号","负责人","到期日","提前提醒天数","提醒日期","状态","来源表","备注"];
  const rows = loadItems().map(x => [x.section,x.type,x.certCategory,x.company,x.name,x.code,x.owner,x.expireDate,x.remindDays,remindDate(x),x.status,x.sourceSheet,x.remark]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v ?? "").replaceAll('"','""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff" + csv], {type:"text/csv;charset=utf-8"});
  downloadBlob(blob, "资质证书车险提醒台账_含资质类别.csv");
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function importJSON(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error("格式错误");
      saveItems(data);
      refreshOptions();
      render();
      alert("导入成功。");
    }catch(err){
      alert("导入失败，请确认是本工具导出的 JSON 文件。");
    }
  };
  reader.readAsText(file);
}
function reloadInitialData(){
  if(confirm("确认用本次导入的全部资质证书和车险数据覆盖当前数据吗？")){
    saveItems(INITIAL_ITEMS);
    refreshOptions();
    render();
  }
}
function clearAll(){
  if(confirm("确认清空全部数据吗？请先导出备份。")){
    localStorage.removeItem(KEY);
    refreshOptions();
    render();
  }
}

initializeData();
setInterval(render, 60 * 1000);
render();
